name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  backend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Lint (ruff)
        run: ruff check backend/ --output-format=github || true

      - name: Run tests
        run: python -m pytest backend/tests/ -v --tb=short
        env:
          GROQ_API_KEY: dummy
          OPENWEATHER_API_KEY: dummy

  frontend:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend-main/package-lock.json

      - name: Install dependencies
        run: cd frontend-main && npm ci

      - name: Lint
        run: cd frontend-main && npm run lint
        continue-on-error: true

      - name: Build
        run: cd frontend-main && npm run build
        env:
          VITE_API_BASE_URL: "http://localhost:8000"

  docker:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile
          push: false
          tags: agrigpt-backend:test
